<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SMS Templates — Find What Varies</title>

<!-- Typography: display, body, mono, and Telugu -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Telugu:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Code highlighting theme (dark, for the dark code blocks) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<!-- Shared viewer styling -->
<link rel="stylesheet" href="../assets/viewer.css">
</head>
<body data-kind="worksheet">
  <header class="topbar">
    <span class="brand">SMS&nbsp;Templates · Lab</span>
    <nav class="pipeline" aria-label="Worksheet stages">
      <span class="stage">two copies</span><span class="arrow">›</span>
      <span class="stage stage--focus">what varies?</span><span class="arrow">›</span>
      <span class="stage stage--focus">good names</span><span class="arrow">›</span>
      <span class="stage stage--focus">boundaries</span><span class="arrow">›</span>
      <span class="stage">tickets</span>
    </nav>
  </header>

  <main>
    <div id="status" class="status" aria-live="polite">Rendering worksheet…</div>
    <article id="content" class="md sheet" hidden></article>
  </main>

  <!-- Markdown renderer + syntax highlighter, both from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="../assets/viewer.js"></script>
</body>
</html>
